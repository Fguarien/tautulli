services:
  tautulli:
    image: ghcr.io/linuxserver/tautulli:latest
    container_name: tautulli
    ports:
      - "8282:8181"
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    networks:
      - infrastructure_network
    volumes:
      - /opt/docker/tautulli/config:/config
      - /opt/docker/tautulli/logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/status"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 256m
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
networks:
  infrastructure_network:
    external: true